name: Rubric
description: AI review of spec vs. implementation alignment on pull requests
inputs:
  anthropic-api-key:
    description: Anthropic API key used to run the review.
    required: true
  github-token:
    description: Token used to read the PR and upsert the review comment.
    required: true
    default: "${{ github.token }}"
  model:
    description: Claude model id.
    required: false
    default: "claude-opus-4-8"
  max-diff-tokens:
    description: Input-token budget for the assembled diff prompt.
    required: false
    default: "50000"
  comment:
    description: >-
      Post (or update) the review as a PR comment. When false, the report is
      written to the job summary only. Report-only by default.
    required: false
    default: "false"
  fail-on-misaligned:
    description: Fail the check when the verdict is "misaligned".
    required: false
    default: "false"
outputs:
  verdict:
    description: The review verdict — aligned, partially_aligned, or misaligned.
  misaligned:
    description: '"true" when the verdict is misaligned, otherwise "false".'
runs:
  using: node24
  main: dist/index.cjs
