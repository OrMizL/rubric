name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: @rubric/core is consumed via its built dist/index.d.ts,
      # so typecheck of the dependent packages needs it to exist.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
